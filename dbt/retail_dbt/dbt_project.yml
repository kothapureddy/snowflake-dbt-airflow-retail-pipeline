name: 'retail_dbt'
version: '1.0'
config-version: 2

profile: 'retail_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  retail_dbt:
    staging:
      +materialized: view
      +schema: STAGING

    intermediate:
      +materialized: table
      +schema: STAGING

    marts:
      +materialized: table
      +schema: MART

    +generate_schema_name: false